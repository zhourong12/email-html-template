# 在 push 到 GitHub 后自动运行：校验 .cursor/skills 并上传可下载产物。
# 你需要提供：在 GitHub 新建仓库后，在本目录执行
#   git remote add origin https://github.com/<你>/<仓库>.git
#   git branch -M main && git push -u origin main
name: Cursor skills CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".cursor/skills/**"
      - ".github/workflows/skills-ci.yml"
  push:
    branches: [main, master]
    paths:
      - ".cursor/skills/**"
      - ".github/workflows/skills-ci.yml"

permissions:
  contents: read

jobs:
  validate-and-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure SKILL.md files exist
        run: |
          set -e
          shopt -s nullglob
          files=(.cursor/skills/*/SKILL.md)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .cursor/skills/*/SKILL.md found"
            exit 1
          fi
          for f in "${files[@]}"; do
            echo "OK: $f"
            head -n 1 "$f" | grep -q '^---$' || { echo "Missing YAML frontmatter start in $f"; exit 1; }
          done

      - name: Create zip bundle
        run: |
          cd .cursor/skills
          zip -r "$GITHUB_WORKSPACE/cursor-skills-bundle.zip" .

      - uses: actions/upload-artifact@v4
        with:
          name: cursor-skills-bundle
          path: cursor-skills-bundle.zip
